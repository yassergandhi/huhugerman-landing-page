<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- Fondo negro túnel -->
  <rect width="1200" height="630" fill="#050505"/>

  <!-- Franja amarilla inferior — guiño BVG -->
  <rect x="0" y="580" width="1200" height="50" fill="#ffed00"/>

  <!-- Bloque azul lateral izquierdo — peso visual -->
  <rect x="0" y="0" width="8" height="630" fill="#ffed00"/>

  <!-- ALERTA badge — esquina superior izquierda -->
  <rect x="48" y="48" width="420" height="44" fill="none"
        stroke="#ffed00" stroke-width="1.5" stroke-opacity="0.35"/>
  <text x="68" y="76"
        font-family="Arial Narrow, sans-serif"
        font-size="18"
        font-weight="700"
        fill="#ffed00"
        letter-spacing="3"
        opacity="0.8">
    ▲  ALERTA: 41% DE ABANDONO (DAAD)
  </text>

  <!-- H1 principal — Barlow Condensed look -->
  <text x="48" y="240"
        font-family="Barlow Condensed, Arial Narrow, Impact, sans-serif"
        font-size="148"
        font-weight="900"
        font-style="italic"
        fill="#f8f8f8"
        letter-spacing="-3">
    NO EL ALEMÁN
  </text>
  <text x="48" y="388"
        font-family="Barlow Condensed, Arial Narrow, Impact, sans-serif"
        font-size="148"
        font-weight="900"
        font-style="italic"
        fill="#ffed00"
        letter-spacing="-3">
    DEL LIBRO.
  </text>

  <!-- Subtítulo — lado derecho, alineado al valor -->
  <text x="1152" y="490"
        text-anchor="end"
        font-family="Arial Narrow, sans-serif"
        font-size="28"
        font-weight="400"
        fill="#ffffff"
        opacity="0.55"
        letter-spacing="1">
    El alemán de la calle. Desde A1.
  </text>

  <!-- Marca — sobre la franja amarilla -->
  <text x="48" y="618"
        font-family="Barlow Condensed, Arial Narrow, Impact, sans-serif"
        font-size="26"
        font-weight="900"
        font-style="italic"
        fill="#003da5"
        letter-spacing="2">
    huhuGERMAN
  </text>

  <!-- URL derecha — sobre la franja amarilla -->
  <text x="1152" y="618"
        text-anchor="end"
        font-family="Arial Narrow, sans-serif"
        font-size="22"
        font-weight="700"
        fill="#003da5"
        letter-spacing="1">
    huhugerman.com
  </text>

</svg>
